<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>カメラマンを探す | PhotoMatch</title>
<link rel="icon" href="assets/photomatch-icon-transparent.png">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
</head>
<body>

<header class="pm-header" id="pm-header"></header>

<main>
  <section class="pm-wrap" style="padding:24px 32px 0">
    <a class="pm-back-link" href="index.html">← トップに戻る</a>
    <h1 style="font:700 26px var(--pm-font-body);margin:16px 0 4px">名古屋エリアのカメラマン</h1>
    <p id="pm-result-count" style="color:var(--pm-text-3);font:14px var(--pm-font-body);margin:0"></p>
  </section>

  <section class="pm-wrap" style="padding:8px 32px 80px">
    <div id="pm-loading" class="pm-loading">読み込み中…</div>
    <div id="pm-results" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px"></div>
  </section>
</main>

<footer class="pm-footer" id="pm-footer"></footer>

<script type="module" src="js/pages/search.js"></script>
</body>
</html>
